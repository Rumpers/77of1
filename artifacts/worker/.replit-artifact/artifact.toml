kind = "worker"
title = "Generation Worker"
version = "1.0.0"
id = "worker_generation_dlq"

[[services]]
name = "Generation Worker"

[services.development]
run = "pnpm --filter @workspace/worker run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/worker", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/worker/dist/index.mjs"]

[services.production.run.env]
NODE_ENV = "production"
