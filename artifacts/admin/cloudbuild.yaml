steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - artifacts/admin/Dockerfile
      - -t
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/admin/admin-console:$COMMIT_SHA'
      - -t
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/admin/admin-console:latest'
      - .
    dir: '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/admin/admin-console'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - admin-console
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/admin/admin-console:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --port=8080
      - --min-instances=0
      - --max-instances=5
      - --memory=512Mi
      - --cpu=1
      - --service-account=admin-console@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=ADMIN_DATABASE_URL=admin-database-url:latest,NEXTAUTH_SECRET=nextauth-secret:latest,NEXTAUTH_URL=nextauth-url:latest,GOOGLE_CLIENT_ID=admin-google-client-id:latest,GOOGLE_CLIENT_SECRET=admin-google-client-secret:latest,AUDIT_SIGNING_SECRET=audit-signing-secret:latest

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
